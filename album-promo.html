<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Calico</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="album-promo.css" />
  </head>
  <body>
    <!-- Ticket A: header, fixed footer-links sidebar, and footer content are
         all rendered by album-promo.js (same DOM-construction pattern as
         app.js's initApp()) rather than hard-coded here. -->
    <div id="album-promo-root"></div>

    <!-- Ticket C (issue #157 review, 2026-07-24): React + ReactDOM UMD builds
         via CDN only (no npm install, no JSX/build step) — a scoped
         exception to the vanilla-JS/jQuery stack decision (issue #20) for
         the Music Player Card's playback-controls island only, matching the
         same exception already locked for Ticket D's cover-art component
         (issue #158). Must load before album-promo.js, which references the
         React/ReactDOM globals when mounting the controls. -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="album-promo.js"></script>
  </body>
</html>
